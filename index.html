<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>jonah@novoseller — terminal</title>
<meta name="description" content="Jonah Novoseller (kingdragoncat) — 16-year-old developer. Interactive terminal portfolio. Security, Rust, hardware. Nokia intern, founder of Mythofy.">
<meta property="og:title" content="jonah@novoseller — interactive terminal">
<meta property="og:description" content="16-year-old developer building security tools, hardware, and platforms. Type 'help' to explore.">
<style>
  :root{
    --bg:#0a0e0d; --text:#c3d0cb; --green:#54e39a; --cyan:#4fd6e0;
    --dim:#5f7168; --amber:#e5c07b; --red:#ff6b6b;
    --mono: ui-monospace,"JetBrains Mono","SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:var(--mono); font-size:15px; line-height:1.55;
  }
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:5;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0, rgba(0,0,0,.16) 1px, transparent 1px, transparent 3px);
    opacity:.35;
  }
  body::after{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:5;
    background:radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,.45) 100%);
  }
  #screen{
    position:relative; z-index:1; height:100%; overflow-y:auto;
    padding:22px clamp(14px,4vw,60px) 60px; cursor:text;
  }
  #out .row{white-space:pre-wrap; word-break:break-word}
  .prompt{color:var(--green); text-shadow:0 0 8px rgba(84,227,154,.35)}
  .sep{color:var(--text)} .path{color:var(--cyan)} .dollar{color:var(--dim)}
  a{color:var(--cyan); text-decoration:none}
  a:hover{text-decoration:underline; text-shadow:0 0 8px rgba(79,214,224,.4)}
  .k{color:var(--green); cursor:pointer}
  .k:hover{text-decoration:underline}
  .err{color:var(--red)}
  .amber{color:var(--amber)} .dim{color:var(--dim)} .green{color:var(--green)} .cyan{color:var(--cyan)}
  b{color:#e8f0ec}
  .logo{color:var(--green); text-shadow:0 0 10px rgba(84,227,154,.3)}
  .spacer{height:8px}

  #line{display:flex; align-items:baseline; white-space:pre; margin-top:2px}
  #cmd{
    flex:1; background:transparent; border:0; outline:0; color:var(--text);
    font:inherit; caret-color:transparent; padding:0; margin-left:8px; min-width:2ch;
  }
  #caret{
    display:inline-block; width:9px; height:16px; background:var(--green);
    transform:translateY(2px); animation:blink 1.05s steps(1) infinite;
    box-shadow:0 0 8px rgba(84,227,154,.5);
  }
  @keyframes blink{50%{opacity:0}}
  .hint{color:var(--dim)}
  ::selection{background:rgba(84,227,154,.28)}
  #screen::-webkit-scrollbar{width:10px}
  #screen::-webkit-scrollbar-thumb{background:#1c2a25; border-radius:6px}
</style>
</head>
<body>
<div id="screen">
  <div id="out"></div>
  <div id="line">
    <span class="prompt">visitor@novoseller</span><span class="sep">:</span><span class="path">~</span><span class="dollar">$</span>
    <input id="cmd" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="terminal input">
    <span id="caret"></span>
  </div>
</div>

<script>
(function(){
  var out = document.getElementById('out');
  var screen = document.getElementById('screen');
  var input = document.getElementById('cmd');
  var caret = document.getElementById('caret');
  var history = [], hpos = -1;

  function esc(s){ return String(s).replace(/[&<>]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]; }); }
  function row(html){ var d=document.createElement('div'); d.className='row'; d.innerHTML=html; out.appendChild(d); }
  function print(lines){ (Array.isArray(lines)?lines:[lines]).forEach(row); scroll(); }
  function gap(){ var d=document.createElement('div'); d.className='spacer'; out.appendChild(d); }
  function scroll(){ screen.scrollTop = screen.scrollHeight; }

  function echo(cmd){
    row('<span class="prompt">visitor@novoseller</span>:<span class="path">~</span><span class="dollar">$</span> ' + esc(cmd));
  }
  function link(url, label){ return '<a href="'+url+'" target="_blank" rel="noopener">'+(label||url)+'</a>'; }
  function cmdchip(name){ return '<span class="k" data-cmd="'+name+'">'+name+'</span>'; }

  var projects = {
    'blackbox': ['<b>blackbox</b>  <span class="amber">(Rust)</span>',
      'A flight recorder for terminal &amp; SSH sessions: record, replay,',
      'full-text search, and tamper-evident hash-chained logs.',
      'repo: ' + link('https://github.com/Kingdragoncat/blackbox')],
    'knox-key': ['<b>knox-key</b>  <span class="amber">(C)</span>',
      'An open-source USB-C hardware security key. Zero-trust hardware',
      'architecture with a dedicated secure element for identity + crypto.',
      'repo: ' + link('https://github.com/Kingdragoncat/Knox-Key')],
    'mythofy': ['<b>mythofy</b>  <span class="amber">(Next.js / TypeScript)</span>',
      'A platform of tools for creators, developers, and communities.',
      'The company I founded and lead.',
      'site: ' + link('https://mythofy.net')],
    'mythopay': ['<b>mythopay</b>  <span class="amber">(Node.js / Stripe Connect)</span>',
      'A Stripe Connect payment system for the Minecraft creator economy.',
      'site: ' + link('https://mythopay.net')],
    'combatghost': ['<b>combatghost</b>  <span class="amber">(Java)</span>',
      'Anti-combat-log Minecraft plugin: tags players in combat and spawns',
      'ghost NPCs on logout, with WorldGuard region integration.',
      'repo: ' + link('https://github.com/Kingdragoncat/CombatGhost')],
    'mlp': ['<b>mlp</b> — MythofyLaunchPads  <span class="amber">(Java)</span>',
      'A lightweight plugin adding configurable launchpads: materials,',
      'velocities, cooldowns, and synced pads.',
      'repo: ' + link('https://github.com/Kingdragoncat/MLP')]
  };

  var commands = {
    help: function(){ return [
      '<span class="green">available commands</span>',
      '  ' + cmdchip('about') + '        who I am',
      '  ' + cmdchip('projects') + '     things I have built',
      '  ' + cmdchip('skills') + '       my tech stack',
      '  ' + cmdchip('experience') + '   where I work and study',
      '  ' + cmdchip('contact') + '      how to reach me',
      '  ' + cmdchip('neofetch') + '     system info',
      '  ' + cmdchip('clear') + '        clear the screen',
      '<span class="hint">tip: Tab autocompletes, up/down cycles history. try a project name too, e.g. ' + cmdchip('blackbox') + '</span>'
    ]; },
    about: function(){ return [
      '<b>Jonah Novoseller</b> <span class="dim">(kingdragoncat)</span>',
      '16 y/o full-stack developer from Canada.',
      'Future Tech Intern @ Nokia. Founder of Mythofy Inc.',
      'Into security, red teaming, Rust, hardware, and secure terminals.',
      '8x national debater; I mentor students in debate and public speaking.',
      '',
      'Type ' + cmdchip('projects') + ' to see what I have built.'
    ]; },
    projects: function(){ return [
      '<span class="green">projects</span> <span class="hint">(type a name for details)</span>',
      '  ' + cmdchip('blackbox') + '      <span class="dim">Rust  · tamper-evident terminal/SSH recorder</span>',
      '  ' + cmdchip('knox-key') + '      <span class="dim">C     · open-source USB-C hardware key</span>',
      '  ' + cmdchip('mythofy') + '       <span class="dim">TS    · platform for creators</span>',
      '  ' + cmdchip('mythopay') + '      <span class="dim">Node  · Stripe payments for Minecraft</span>',
      '  ' + cmdchip('combatghost') + '   <span class="dim">Java  · anti-combat-log plugin</span>',
      '  ' + cmdchip('mlp') + '           <span class="dim">Java  · configurable launchpads</span>'
    ]; },
    skills: function(){ return [
      '<span class="cyan">languages</span>   Rust · TypeScript · JavaScript · Java · Python · C',
      '<span class="cyan">frontend</span>    React · Next.js · Tailwind',
      '<span class="cyan">backend</span>     Node.js · Express · REST · Stripe Connect',
      '<span class="cyan">systems</span>     Linux · Docker · Kubernetes · CI/CD',
      '<span class="cyan">security</span>    red teaming · secure terminals · hardware auth'
    ]; },
    experience: function(){ return [
      '<b>Nokia</b>          Future Tech Intern           <span class="dim">2025 - present</span>',
      '<b>Mythofy Inc.</b>   Founder &amp; full-stack dev',
      '<b>Debate</b>         8x national debater &amp; mentor'
    ]; },
    contact: function(){ return [
      '<span class="green">get in touch</span>',
      '  LinkedIn   ' + link('https://www.linkedin.com/in/jonah-novoseller/','in/jonah-novoseller'),
      '  GitHub     ' + link('https://github.com/Kingdragoncat','@Kingdragoncat'),
      '  Discord    @kingdragoncat',
      '  Email      <span class="dim">jonah@novoseller.com (coming soon)</span>'
    ]; },
    social: function(){ return commands.contact(); },
    neofetch: function(){ return [
      '<span class="logo">     .-----.     </span>   <b>jonah</b>@<b>novoseller</b>',
      '<span class="logo">    ( o   o )    </span>   <span class="dim">-------------------</span>',
      '<span class="logo">     )  ^  (     </span>   <span class="cyan">os</span>      shipping real systems',
      '<span class="logo">    ( ~~~~~ )    </span>   <span class="cyan">host</span>    novoseller.com',
      '<span class="logo">     `-----`     </span>   <span class="cyan">uptime</span>  16 years',
      '                       <span class="cyan">shell</span>   zsh',
      '                       <span class="cyan">langs</span>   rust, ts, java, c',
      '                       <span class="cyan">focus</span>   security · hardware · red team'
    ]; },
    whoami: function(){ return ['jonah <span class="dim">(kingdragoncat)</span>']; },
    ls: function(){ return commands.projects(); },
    sudo: function(){ return ['<span class="err">Permission denied.</span> nice try <span class="dim">;)</span>']; },
    hire: function(){ return ['always open to interesting opportunities — type ' + cmdchip('contact') + ' :)']; },
    clear: function(){ out.innerHTML=''; return []; }
  };

  function runLine(raw){
    var parts = raw.trim().split(/\s+/);
    var name = (parts[0]||'').toLowerCase();
    echo(raw);
    if(!name){ return; }
    if(commands[name]){ print(commands[name](parts.slice(1))); }
    else if(projects[name]){ print(projects[name]); }
    else { print('<span class="err">command not found: ' + esc(name) + '</span> — type ' + cmdchip('help')); }
    gap();
  }

  function complete(){
    var val = input.value.trim().toLowerCase();
    if(!val) return;
    var names = Object.keys(commands).concat(Object.keys(projects));
    var m = names.filter(function(n){ return n.indexOf(val)===0; });
    if(m.length===1){ input.value = m[0]; }
    else if(m.length>1){ echo(input.value); print('<span class="dim">'+m.join('   ')+'</span>'); gap(); }
  }

  input.addEventListener('keydown', function(e){
    if(e.key==='Enter'){
      var v = input.value; input.value='';
      if(v.trim()){ history.unshift(v); }
      hpos = -1; runLine(v);
    } else if(e.key==='Tab'){ e.preventDefault(); complete(); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); if(hpos<history.length-1){ hpos++; input.value=history[hpos]; } }
    else if(e.key==='ArrowDown'){ e.preventDefault(); if(hpos>0){ hpos--; input.value=history[hpos]; } else { hpos=-1; input.value=''; } }
    else if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='l'){ e.preventDefault(); out.innerHTML=''; }
  });

  document.addEventListener('click', function(e){
    var t = e.target.closest('[data-cmd]');
    if(t){ runLine(t.getAttribute('data-cmd')); input.focus(); }
    else { input.focus(); }
  });

  function boot(){
    print([
      '<span class="dim">booting novoseller.dev ...</span>',
      '<span class="green">ok</span> <span class="dim">welcome. this is an interactive terminal.</span>'
    ]);
    gap();
    setTimeout(function(){ echo('whoami'); print(commands.about()); gap();
      print('<span class="hint">type ' + cmdchip('help') + ' to see everything.</span>'); gap(); scroll(); input.focus(); }, 550);
  }
  boot();
  input.focus();
})();
</script>
</body>
</html>
